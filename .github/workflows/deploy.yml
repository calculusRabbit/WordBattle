name: Build and Push Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/calculusrabbit/wordduel-backend:latest

      - name: Redeploy on Railway
        run: |
          npm i -g @railway/cli
          railway redeploy --service wordduel-backend --project eb9546d2-a934-4167-bde5-e8c0a352b0b4 --environment production --yes
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
