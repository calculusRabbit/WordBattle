services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wordduel
      POSTGRES_USER: vunguyen
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: wordduel
      DB_USER: vunguyen
      DB_PASSWORD: secret
    depends_on:
      - db

volumes:
  postgres_data:
